name: Fallow Codebase Intelligence

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fallow-audit:
    name: Fallow Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for delta analysis (changed files)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run Fallow Audit
        run: pnpm run fallow:audit --ci
