name: Convex Deploy

on:
  push:
    branches:
      - '**' # Trigger on all branches
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::warning::CONVEX_DEPLOY_KEY is not set. Skipping production deployment."
          else
            pnpm convex deploy
          fi

      - name: Deploy Preview
        if: github.ref != 'refs/heads/main' && (github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/'))
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_KEY }}
          CONVEX_DEPLOY_KEY_PROD: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::warning::CONVEX_PREVIEW_KEY is not set. Preview deployments will not work. Please ensure you have created a preview environment in Convex and set the CONVEX_PREVIEW_KEY secret in your GitHub repository."
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
            echo "Creating preview deployment for branch: ${BRANCH_NAME}"
            # Create the preview deployment first so we can set env vars before deploy
            npx convex deployment create "yasir-khan:promptcraft:preview/${BRANCH_NAME}" --type preview --expiration "in 30 days" 2>/dev/null || true

            # Only CLERK_FRONTEND_API_URL is required at deploy time (auth config).
            # Copy it from the production deployment — the value is the same as dev
            # (same Clerk instance). Other env vars are runtime-only.
            CLERK_URL="$(CONVEX_DEPLOY_KEY="$CONVEX_DEPLOY_KEY_PROD" npx convex env get CLERK_FRONTEND_API_URL 2>/dev/null)"
            if [ -n "$CLERK_URL" ] && [ "$CLERK_URL" != "null" ]; then
              npx convex env set CLERK_FRONTEND_API_URL "$CLERK_URL"
            fi

            pnpm convex deploy --preview-name "${BRANCH_NAME}"
          fi
