# pnpm workspace & hardening configuration.
# See: https://pnpm.io/settings

# Delay installs until releases have had time to be vetted.
# 10080 minutes = 7 days. Protects against malware that gets
# caught and unpublished within hours of release.
minimumReleaseAge: 10080

# Reject packages whose trust signals (provenance, signatures)
# weaken between updates, instead of silently accepting them.
trustPolicy: no-downgrade